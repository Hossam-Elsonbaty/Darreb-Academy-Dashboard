@if (isOpen) {
    <div class="fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center z-50">

        <div class="bg-neutral-primary-soft border border-default rounded-base shadow-sm p-6 w-full max-w-md relative">

            <!-- Close button -->
            <button type="button"
                            class="absolute top-3 right-3 text-body hover:bg-neutral-tertiary rounded-base p-2"
                            (click)="onClose()">
                ✕
            </button>

            <div class="text-center mt-4">
                <svg class="mx-auto mb-4 text-fg-disabled w-12 h-12"
                         fill="none" viewBox="0 0 24 24">
                    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 13V8m0 8h.01M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/>
                </svg>

                <h3 class="mb-6 text-body text-lg">{{ title }}</h3>
                <p class="mb-6 text-sm text-gray-600">{{ message }}</p>

                <div class="flex items-center justify-center gap-4">
                    <button class="text-white bg-danger px-4 py-2.5 rounded-base"
                                    (click)="onConfirm()">
                        Yes, I'm sure
                    </button>

                    <button class="bg-neutral-secondary-medium px-4 py-2.5 rounded-base"
                                    (click)="onClose()">
                        No, cancel
                    </button>
                </div>
            </div>

        </div>
    </div>
}
