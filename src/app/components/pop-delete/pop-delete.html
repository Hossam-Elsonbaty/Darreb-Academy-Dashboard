@if (isOpen) {
<div class="fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center z-50" role="dialog" aria-modal="true"
    aria-labelledby="modal-title" aria-describedby="modal-description" (click)="onOverlayClick()">

    <!-- صندوق المودال - لا يغلق عند الضغط عليه -->
    <div class="bg-neutral-primary-soft border border-default rounded-base shadow-sm p-6 w-full max-w-md relative"
        (click)="onContentClick($event)">

        <!-- زر الإغلاق (✕) -->
        <button type="button"
            class="absolute top-3 right-3 text-body hover:bg-neutral-tertiary rounded-base p-2 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
            (click)="onClose()" aria-label="Close modal">
            ✕
        </button>

        <div class="text-center mt-4">
            <!-- أيقونة التحذير -->
            <svg class="mx-auto mb-4 text-fg-disabled w-12 h-12" fill="none" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 13V8m0 8h.01M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
            </svg>

            <!-- العنوان -->
            <h3 id="modal-title" class="mb-6 text-body text-lg font-semibold">
                {{ title }}
            </h3>

            <!-- الرسالة -->
            <p id="modal-description" class="mb-6 text-sm text-gray-600">
                {{ message }}
            </p>

            <!-- الأزرار -->
            <div class="flex items-center justify-center gap-4">
                <button
                    class="text-white bg-danger px-4 py-2.5 rounded-base transition-all hover:bg-red-700 disabled:opacity-60 disabled:cursor-not-allowed flex items-center justify-center min-w-[120px]"
                    (click)="onConfirm()" type="button">
                    Yes, I'm sure
                </button>



                <!-- زر الإلغاء -->
                <button
                    class="bg-neutral-secondary-medium px-4 py-2.5 rounded-base transition-all hover:bg-gray-300 disabled:opacity-60 disabled:cursor-not-allowed"
                    (click)="onClose()" type="button">
                    No, cancel
                </button>
            </div>
        </div>

    </div>
</div>
}
